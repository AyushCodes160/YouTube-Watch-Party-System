name: Keep Render Deployment Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render from going to sleep
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Deployment
        run: |
          echo "Pinging the API..."
          curl -sSf "https://youtube-watch-party-system-lbxa.onrender.com/api/ping" || echo "Ping failed, but continuing so workflow passes."
